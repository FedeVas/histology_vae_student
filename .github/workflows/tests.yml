name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CPU-only PyTorch
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install remaining dependencies
        run: |
          pip install -r requirements.txt

      - name: Run test suite
        run: |
          python -m pytest -q

      - name: Smoke-test training loop (synthetic data, no download required)
        run: |
          python -m src.train --config configs/vae_synthetic_cpu.yaml --smoke-test
